<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form Replica</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="login-wrap">
        <div class="avatar-row">
          <span class="line"></span>
          <div class="avatar">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <circle cx="32" cy="23" r="11"></circle>
              <path d="M12 50c0-11 9-20 20-20s20 9 20 20"></path>
            </svg>
          </div>
          <span class="line"></span>
        </div>

        <form class="card" action="#" method="post">
          <div class="field">
            <div class="icon-cell" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4.5 20c0-4.3 3.3-7 7.5-7s7.5 2.7 7.5 7"></path>
              </svg>
            </div>
            <input type="text" name="username" placeholder="Username" />
          </div>

          <div class="field">
            <div class="icon-cell" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="10" width="14" height="10" rx="1.5"></rect>
                <path d="M8 10V7.7A4 4 0 0 1 12 4a4 4 0 0 1 4 3.7V10"></path>
                <circle cx="12" cy="15" r="1.2"></circle>
              </svg>
            </div>
            <input type="password" name="password" placeholder="***********" />
          </div>

          <div class="meta-row">
            <label class="remember">
              <input type="checkbox" checked />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>
        </form>

        <button type="button" class="login-btn">LOGIN</button>
      </section>
    </main>
  </body>
</html>
